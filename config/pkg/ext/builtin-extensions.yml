ext-bcmath:
  type: php-extension
ext-bz2:
  type: php-extension
  depends:
    - bzip2
  php-extension:
    arg-type@unix: with-path
    arg-type@windows: with
ext-calendar:
  type: php-extension
ext-ctype:
  type: php-extension
ext-curl:
  type: php-extension
  depends:
    - curl
  depends@windows:
    - ext-zlib
    - ext-openssl
  php-extension:
    arg-type: with
ext-mbregex:
  type: php-extension
  depends:
    - onig
    - ext-mbstring
  php-extension:
    arg-type: custom
    build-shared: false
    build-static: true
    display-name: mbstring
ext-mbstring:
  type: php-extension
  php-extension:
    arg-type: custom
ext-openssl:
  type: php-extension
  depends:
    - openssl
    - zlib
    - ext-zlib
  php-extension:
    arg-type: custom
    arg-type@windows: with
    build-with-php: true
ext-phar:
  type: php-extension
  depends:
    - zlib
ext-readline:
  type: php-extension
  depends:
    - libedit
  php-extension:
    support:
      Windows: wip
      BSD: wip
    arg-type: '--with-libedit --without-readline'
    build-shared: false
    build-static: true
ext-zlib:
  type: php-extension
  depends:
    - zlib
  php-extension:
    arg-type: custom
    arg-type@windows: with
    build-with-php: true
    build-shared: false
