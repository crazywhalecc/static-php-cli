ext-ssh2:
  type: php-extension
  artifact:
    source:
      type: ghtar
      repo: php/pecl-networking-ssh2
      extract: php-src/ext/ssh2
    metadata:
      license-files: [LICENSE]
      license: PHP-3.01
  depends:
    - libssh2
    - ext-openssl
    - ext-zlib
  php-extension:
    arg-type: with-path
