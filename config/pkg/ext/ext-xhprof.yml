ext-xhprof:
  type: php-extension
  artifact:
    source:
      type: pecl
      name: xhprof
      extract: php-src/ext/xhprof-src
    metadata:
      license-files: [LICENSE]
      license: Apache-2.0
  depends:
    - ext-ctype
  php-extension:
    os:
      - Linux
      - Darwin
    arg-type: enable
    build-with-php: true
