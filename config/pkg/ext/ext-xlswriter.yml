ext-xlswriter:
  type: php-extension
  artifact:
    source:
      type: pie
      repo: viest/xlswriter
      extract: php-src/ext/xlswriter
    metadata:
      license-files: [LICENSE]
      license: BSD-2-Clause
  depends:
    - ext-zlib
    - ext-zip
  suggests:
    - openssl
  php-extension:
    arg-type: custom
    arg-type@windows: '--with-xlswriter'
