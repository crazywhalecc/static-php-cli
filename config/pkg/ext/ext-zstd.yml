ext-zstd:
  type: php-extension
  artifact:
    source:
      type: ghtar
      repo: kjdev/php-ext-zstd
      extract: php-src/ext/zstd
    metadata:
      license-files: [LICENSE]
      license: MIT
  depends:
    - zstd
  suggests:
    - ext-apcu
  php-extension:
    arg-type: '--enable-zstd --with-libzstd=@build_root_path@'
    arg-type@windows: '--enable-zstd'
