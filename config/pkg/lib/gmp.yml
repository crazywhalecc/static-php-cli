gmp:
  type: library
  artifact:
    source:
      type: filelist
      url: 'https://ftp.gnu.org/gnu/gmp/'
      regex: '/href="(?<file>gmp-(?<version>[^"]+)\.tar\.xz)"/'
    source-mirror:
      type: filelist
      url: 'https://ftpmirror.gnu.org/gnu/gmp/'
      regex: '/href="(?<file>gmp-(?<version>[^"]+)\.tar\.xz)"/'
    metadata:
      license-files: ['@/gmp.txt']
      license: Custom
  headers:
    - gmp.h
  pkg-configs:
    - gmp
  static-libs@unix:
    - libgmp.a
