krb5:
  type: library
  artifact:
    source:
      type: url
      url: 'https://web.mit.edu/kerberos/dist/krb5/1.22/krb5-1.22.2.tar.gz'
      build-root: src
    metadata:
      license-files: [NOTICE]
      license: BSD-3-Clause
  depends:
    - openssl
  suggests:
    - ldap
    - libedit
  frameworks:
    - Kerberos
  headers:
    - krb5.h
    - gssapi/gssapi.h
  pkg-configs:
    - krb5-gssapi
