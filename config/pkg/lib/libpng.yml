libpng:
  type: library
  artifact:
    source:
      type: ghtagtar
      repo: pnggroup/libpng
      match: v1\.6\.\d+
      query: '?per_page=150'
    binary: hosted
    metadata:
      license-files: [LICENSE]
      license: PNG
  depends:
    - zlib
  static-libs@unix:
    - libpng16.a
  static-libs@windows:
    - libpng16_static.lib
    - libpng_a.lib
