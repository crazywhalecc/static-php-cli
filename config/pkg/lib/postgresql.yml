postgresql:
  type: library
  artifact:
    source:
      type: ghtagtar
      repo: postgres/postgres
      match: REL_18_\d+
    metadata:
      license-files: ['@/postgresql.txt']
      license: PostgreSQL
  depends@unix:
    - libiconv
    - libxml2
    - openssl
    - zlib
    - libedit
  depends@windows:
    - openssl
    - zlib
  tools@windows:
    - meson
    - ninja
    - winflexbison
    - strawberry-perl
  suggests@unix:
    - icu
    - libxslt
    - ldap
    - zstd
  pkg-configs:
    - libpq
  static-libs@windows:
    - libpq.lib
    - libpgport.lib
    - libpgcommon.lib
