curl:
  type: target
  artifact:
    source:
      type: ghrel
      repo: curl/curl
      match: curl.+\.tar\.xz
      prefer-stable: true
    metadata:
      license-files: [COPYING]
      license: curl
  depends@unix:
    - openssl
    - zlib
  depends@windows:
    - zlib
    - libssh2
    - nghttp2
  suggests@unix:
    - libssh2
    - brotli
    - nghttp2
    - nghttp3
    - ngtcp2
    - zstd
    - libcares
    - ldap
    - idn2
    - krb5
  suggests@windows:
    - brotli
    - zstd
  frameworks:
    - CoreFoundation
    - CoreServices
    - SystemConfiguration
  headers:
    - curl
  static-bins@unix:
    - curl
  static-libs@unix:
    - libcurl.a
  static-libs@windows:
    - libcurl_a.lib
