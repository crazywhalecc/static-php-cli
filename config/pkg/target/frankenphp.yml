frankenphp:
  type: target
  artifact:
    source:
      type: ghtar
      repo: php/frankenphp
      prefer-stable: true
    metadata:
      license-files: [LICENSE]
      license: MIT
  depends:
    - php-embed
    - go-xcaddy
  depends@windows:
    - php-embed
    - go-win
    - pthreads4w
  suggests@unix:
    - brotli
    - watcher
  suggests@windows:
    - brotli
  static-bins@unix:
    - frankenphp
  static-bins@windows:
    - frankenphp.exe
