go-xcaddy:
  type: tool
  artifact:
    binary: custom
  env:
    GOROOT: '{pkg_root_path}/go-xcaddy'
    GOBIN: '{pkg_root_path}/go-xcaddy/bin'
    GOPATH: '{pkg_root_path}/go-xcaddy/go'
  path@unix:
    - '{pkg_root_path}/go-xcaddy/bin'
  tool:
    provides:
      - go
      - gofmt
    binary-subdir: go-xcaddy/bin
